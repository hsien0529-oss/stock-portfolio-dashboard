name: Daily Price Update

on:
  schedule:
    # 06:30 UTC = 14:30 Taipei (台股收盤後 1 小時)
    - cron: '30 6 * * 1-5'
    # 09:00 UTC = 17:00 Taipei (備援，避免 yfinance 短暫故障)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write   # 需要寫權限才能 push commit

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update_prices.py
        run: python3 update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --cached --quiet; then
            echo "✅ 沒有變更，跳過 commit"
          else
            DATE=$(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')
            git commit -m "chore: auto-update prices ($DATE Taipei)"
            git push
            echo "✅ 已推送更新"
          fi
